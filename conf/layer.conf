# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-alientek"
BBFILE_PATTERN_meta-alientek = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-alientek = "10"

LAYERDEPENDS_meta-alientek = "core freescale-layer"
LAYERSERIES_COMPAT_meta-alientek = "kirkstone"
